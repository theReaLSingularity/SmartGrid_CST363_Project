services:
  pg:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart1
      POSTGRES_DB: smartgrid_db
    ports:
      - "5435:5432"
    volumes:
      - smartgrid_pgdata:/var/lib/postgresql/data
      - ./data:/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  smartgrid_pgdata: